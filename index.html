<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      background: black;
    }

    /* Full-width fixed top bar */
    #ticker-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #0b1a2e;
      padding: 20px 0;
      display: flex;
      justify-content: center;
      z-index: 9999;
      border-bottom: 2px solid #1f2f4a;
    }

    #ticker-inner {
      width: 95%;
      max-width: 1400px;
    }

    #oilpriceapi-ticker {
      width: 100%;
      font-size: 1.8rem;
      font-weight: bold;
    }

    /* Strong colors for up/down */
    #oilpriceapi-ticker .positive,
    #oilpriceapi-ticker .up {
      color: #00ff88 !important;
      text-shadow: 0 0 6px #00ff88;
    }

    #oilpriceapi-ticker .negative,
    #oilpriceapi-ticker .down {
      color: #ff4d4d !important;
      text-shadow: 0 0 6px #ff4d4d;
    }
  </style>
</head>

<body>

  <div id="ticker-bar">
    <div id="ticker-inner">

      <div id="oilpriceapi-ticker"
           data-theme="dark"
           data-commodities="BRENT,WTI,NATGAS"
           data-layout="horizontal">
      </div>

    </div>
  </div>

  <!-- spacer so content below isn't hidden -->
  <div style="height: 90px;"></div>

  <!-- ✅ REQUIRED SCRIPT (FIXED) -->
  <script src="https://www.oilpriceapi.com/widgets/ticker.js"></script>

</body>
</html>
