<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: #060d18;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Container */
#ticker-container {
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: visible;
}

/* Correct scaling */
#oilpriceapi-ticker {
  transform: scale(5);
  transform-origin: center;
  display: inline-block;
}

/* Colors */
#oilpriceapi-ticker .positive,
#oilpriceapi-ticker .up {
  color: #00ff88 !important;
}

#oilpriceapi-ticker .negative,
#oilpriceapi-ticker .down {
  color: #ff4d4d !important;
}
</style>
</head>

<body>

<div id="ticker-container">
  <div id="oilpriceapi-ticker"
       data-theme="dark"
       data-commodities="BRENT,WTI,NATGAS"
       data-layout="horizontal">
  </div>
</div>

<script src="https://www.oilpriceapi.com/widgets/ticker.js"></script>

</body>
</html>
