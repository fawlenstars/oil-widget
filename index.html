<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Energy Price Ticker</title>

<style>
body {
    margin: 0;
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
}

.ticker-wrap {
    width: 100%;
    overflow: hidden;
    background: #000;
    padding: 10px 0;
}

.ticker {
    display: inline-block;
    white-space: nowrap;
    animation: ticker 30s linear infinite;
}

.item {
    display: inline-block;
    margin-right: 60px;
    font-size: 24px;
}

.up { color: #00ff00; }
.down { color: #ff4444; }

@keyframes ticker {
    from { transform: translateX(100%); }
    to { transform: translateX(-100%); }
}
</style>
</head>

<body>

<div class="ticker-wrap">
    <div class="ticker" id="ticker">
        Loading prices...
    </div>
</div>

<script>
async function updatePrices() {

    const response = await fetch(
        "https://api.oilpriceapi.com/v1/prices/latest",
        {
            headers: {
                "Authorization": "Token YOUR_API_KEY"
            }
        }
    );

    const data = await response.json();

    document.getElementById("ticker").innerHTML = `
        <span class="item">🛢️ WTI: $${data.wti.price}</span>
        <span class="item">🛢️ Brent: $${data.brent.price}</span>
        <span class="item">🔥 Nat Gas: $${data.natural_gas.price}</span>
    `;
}

updatePrices();
setInterval(updatePrices, 60000);
</script>

</body>
</html>
</body>
</html>
