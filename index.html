<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: #060d18;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* BIG CENTER PANEL */
#ticker-container {
  width: 95%;
  max-width: 1600px;
  background: #0b1a2e;
  padding: 60px;            /* 🔥 much larger padding */
  border-radius: 20px;
  border: 3px solid #1f2f4a;
}

/* FORCE VERY LARGE TEXT */
#oilpriceapi-ticker {
  width: 100%;
  transform: scale(3.2);      /* 🔥 BIG SCALE for TV */
  transform-origin: center;
}

/* GREEN / RED highlight */
#oilpriceapi-ticker .positive,
#oilpriceapi-ticker .up {
  color: #00ff88 !important;
  text-shadow: 0 0 12px #00ff88;
}

#oilpriceapi-ticker .negative,
#oilpriceapi-ticker .down {
  color: #ff4d4d !important;
  text-shadow: 0 0 12px #ff4d4d;
}
</style>
</head>

<body>

<div id="ticker-container">
  <div id="oilpriceapi-ticker"
       data-theme="dark"
       data-commodities="BRENT,WTI,NATGAS"
       data-layout="horizontal">
  </div>
</div>

<script src="https://www.oilpriceapi.com/widgets/ticker.js"></script>

</body>
</html>
