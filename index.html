<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: #060d18;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* FULL SCREEN CONTAINER */
#ticker-container {
  width: 100%;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
}

/* INNER WRAPPER — IMPORTANT */
#ticker-inner {
  width: 100%;
  display: flex;
  justify-content: center;
}

/* SCALE + WIDTH FIX */
#oilpriceapi-ticker {
  transform: scale(5);
  transform-origin: center;

  /* 👇 THIS FIXES THE "SMALL BOX" PROBLEM */
  width: 180%;   /* increase to spread items apart */
}

/* Colors */
#oilpriceapi-ticker .positive,
#oilpriceapi-ticker .up {
  color: #00ff88 !important;
  text-shadow: 0 0 15px #00ff88;
}

#oilpriceapi-ticker .negative,
#oilpriceapi-ticker .down {
  color: #ff4d4d !important;
  text-shadow: 0 0 15px #ff4d4d;
}
</style>
</head>

<body>

<div id="ticker-container">
  <div id="ticker-inner">

    <div id="oilpriceapi-ticker"
         data-theme="dark"
         data-commodities="BRENT,WTI,NATGAS"
         data-layout="horizontal">
    </div>

  </div>
</div>

<script src="https://www.oilpriceapi.com/widgets/ticker.js"></script>

</body>
</html>
``
