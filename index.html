<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: #060d18;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* Container fills most of screen */
#ticker-container {
  width: 95%;
  height: 60vh; /* helps centering with scale */
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b1a2e;
  border-radius: 20px;
  border: 3px solid #1f2f4a;
}

/* 🔥 ULTRA LARGE TV SCALE */
#oilpriceapi-ticker {
  transform: scale(7);
  transform-origin: center;
}

/* Bright colors for visibility */
#oilpriceapi-ticker .positive,
#oilpriceapi-ticker .up {
  color: #00ff88 !important;
  text-shadow: 0 0 20px #00ff88;
}

#oilpriceapi-ticker .negative,
#oilpriceapi-ticker .down {
  color: #ff4d4d !important;
  text-shadow: 0 0 20px #ff4d4d;
}
</style>
</head>

<body>

<div id="ticker-container">
  <div id="oilpriceapi-ticker"
       data-theme="dark"
       data-commodities="BRENT,WTI,NATGAS"
       data-layout="horizontal">
  </div>
</div>

<script src="https://www.oilpriceapi.com/widgets/ticker.js"></script>

</body>
</html>
