<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: #060d18;
  display: flex;
  flex-direction: column;      /* stack title + ticker */
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* 🔥 HEADER TEXT */
#title {
  color: #ffffff;
  font-size: 4rem;             /* BIG for TV */
  font-weight: bold;
  letter-spacing: 2px;
  margin-bottom: 40px;
  text-shadow: 0 0 15px #00ffcc;
}

/* Container */
#ticker-container {
  width: 100%;
  display: flex;
  justify-content: center;
}

/* Scale + width fix */
#oilpriceapi-ticker {
  transform: scale(5);
  transform-origin: center;
  width: 180%;
}

/* Colors */
#oilpriceapi-ticker .positive,
#oilpriceapi-ticker .up {
  color: #00ff88 !important;
  text-shadow: 0 0 15px #00ff88;
}

#oilpriceapi-ticker .negative,
#oilpriceapi-ticker .down {
  color: #ff4d4d !important;
  text-shadow: 0 0 15px #ff4d4d;
}
</style>
</head>

<body>

<div id="title">LIVE OIL PRICES</div>

<div id="ticker-container">
  <div id="oilpriceapi-ticker"
       data-theme="dark"
       data-commodities="BRENT,WTI,NATGAS"
       data-layout="horizontal">
  </div>
</div>

<script src="https://www.oilpriceapi.com/widgets/ticker.js"></script>

</body>
</html>
