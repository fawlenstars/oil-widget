<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: #060d18;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial, sans-serif;
}

/* Center container */
#ticker-container {
  width: 100%;
  height: 70vh;              /* gives room for scaling */
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Widget scaling */
#oilpriceapi-ticker {
  transform: scale(5);
  transform-origin: center;
}

/* Bright green (up) */
#oilpriceapi-ticker .positive,
#oilpriceapi-ticker .up {
  color: #00ff88 !important;
  text-shadow: 0 0 15px #00ff88;
}

/* Bright red (down) */
#oilpriceapi-ticker .negative,
#oilpriceapi-ticker .down {
  color: #ff4d4d !important;
  text-shadow: 0 0 15px #ff4d4d;
}
</style>
</head>

<body>

<div id="ticker-container">
  <div id="oilpriceapi-ticker"
       data-theme="dark"
       data-commodities="BRENT,WTI,NATGAS"
       data-layout="horizontal">
  </div>
</div>

<script src="https://www.oilpriceapi.com/widgets/ticker.js"></script>

</body>
</html>
