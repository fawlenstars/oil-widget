<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      background: black;

      /* ✅ TRUE CENTERING */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Container size */
    #ticker-container {
      width: 95%;
      max-width: 1200px;
      background: #0b1a2e;
      padding: 30px;
      border-radius: 12px;
      border: 2px solid #1f2f4a;
    }

    /* Make widget BIG */
    #oilpriceapi-ticker {
      width: 100%;
      font-size: 2.2rem;
      font-weight: bold;
    }

    /* Strong green/up */
    #oilpriceapi-ticker .positive,
    #oilpriceapi-ticker .up {
      color: #00ff88 !important;
      text-shadow: 0 0 6px #00ff88;
    }

    /* Strong red/down */
    #oilpriceapi-ticker .negative,
    #oilpriceapi-ticker .down {
      color: #ff4d4d !important;
      text-shadow: 0 0 6px #ff4d4d;
    }
  </style>
</head>

<body>

  <div id="ticker-container">
    <div id="oilpriceapi-ticker"
         data-theme="dark"
         data-commodities="BRENT,WTI,NATGAS"
         data-layout="horizontal">
    </div>
  </div>

  <script src="https://www.oilpriceapi.com/widgets/ticker.js"></script>

</body>
</html>
